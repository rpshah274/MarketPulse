version: '3.8'
services:
  redis:
    image: redis/redis-stack:latest
    container_name: marketpulse-redis
    ports:
      - "6379:6379"
  grafana:
    image: grafana/grafana:latest
    container_name: marketpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - redis
  prometheus:
    image: prom/prometheus:latest
    container_name: marketpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  postgres:
    image: postgres:15
    container_name: marketpulse-postgres
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
volumes:
  postgres_data: