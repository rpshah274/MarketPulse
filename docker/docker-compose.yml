version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: marketpulse-redis
    ports:
      - "6379:6379"

  grafana:
    image: grafana/grafana:latest
    container_name: marketpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - redis